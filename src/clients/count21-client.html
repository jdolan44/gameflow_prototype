<!DOCTYPE html>

<head>
    <title>Count to 21</title>
</head>

<body>
    <h1>Count to 21</h1>
    <div id="status">waiting to connect...</div>
    <hr />
    <section id="game">
        <div>Current count: <span id="count">0</span></div>
        <button class="submit" value="1" disabled="true">+1</button>
        <button class="submit" value="2" disabled="true">+2</button>
        <button class="submit" value="3" disabled="true">+3</button>
    </section>
    <script type="module">
        import { Client } from "http://localhost:3000/gameflow_client.js";

        /** @type {Client} */
        const client = new Client("http://localhost:3000");
        client.joinGame("count21");

        client.onJoin(({ status }) => {
            document.getElementById("status").innerHTML = status;
            if (status == "begin") {
                document.getElementById("game").removeAttribute("hidden");
            }
        });

        client.onStateUpdate((gameState) => {
            document.getElementById("count").innerHTML = gameState.count;
        });

        client.onMyTurn((gameState) => {
            //disable all buttons that are valid moves
            document.querySelectorAll(".submit").forEach((button) => {
                let buttonVal = parseInt(button.getAttribute("value"));
                if (gameState.count + buttonVal <= 21) {
                    button.removeAttribute("disabled");
                }
            });
        });

        //add the take turn listener to each button
        document.querySelectorAll(".submit").forEach((button) => {
            button.addEventListener("click", (event) => {
                takeTurn(parseInt(button.getAttribute("value")));
            });
        });

        function takeTurn(count) {
            client.takeTurn({ count });
            document.querySelectorAll(".submit").forEach((button) => {
                button.setAttribute("disabled", "true");
            });
        }

        //deal with game end
        client.onGameOver((outcome) => {
            if (outcome.isWinner) {
                document.getElementById("status").innerHTML = "you win!";
            }
            else {
                document.getElementById("status").innerHTML = "you lose!";
            }
        });
    </script>
</body>
