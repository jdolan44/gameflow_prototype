<!DOCTYPE html>
<html>

<head>
    <title>Simple Game prototype!</title>
    <style>
        div {
            padding: 10px;
        }

        #join {
            margin-right: 20px;
        }

        #submit {
            margin-left: 20px;
        }
    </style>
</head>

<body>
    <div>
        <h2>Simple Game</h2>
        This game is really simple. <br />
        Rules:
        <ul>
            <li>If you want to win, type "I want to win".</li>
            <li>If you don't (for some reason), type "pass".</li>
            <li>players alternate turns until somebody wants to win.</li>
        </ul>
    </div>
    <div>
        <button id="join">Join Game</button>
        <span id="join_status"></span>
    </div>
    <div>
        <input type="text" id="turn_input" />
        <button id="submit" disabled>Submit</button>
    </div>
    <div id="game_status">

    </div>
    <div>
        <button id="quit">Quit Game</button>
    </div>

    <script type="module" src="./simple-client.js"></script>
</body>

</html>
